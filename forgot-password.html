<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Forgot Password — Warid</title>
  <link rel="stylesheet" href="login.css"/>
</head>
<body>
  <nav class="nav">
    <a href="index.html" class="logo">
      <span class="logo-dot"></span>WARID
    </a>
    <ul class="nav-links">
      <li><a href="index.html#how">How it works</a></li>
      <li><a href="register-donor.html">Donate</a></li>
      <li><a href="register-needy.html" class="nav-cta">Need blood?</a></li>
    </ul>
  </nav>
  <section class="auth auth-centered">
    <div class="auth-card">
      <span class="auth-eyebrow fade-up">Account recovery</span>
      <h1 class="auth-title fade-up-2">Reset your password</h1>
      <p class="auth-sub fade-up-3">
        Enter the email or phone number linked to your account, the verification code we sent you, and your new password.
      </p>
      <form id="resetForm" class="auth-form fade-up-3">
        <div class="field">
          <label for="identifier">Email or phone number</label>
          <input type="text" id="identifier" name="identifier" placeholder="you@example.com or 0XX XXX XXXX" required>
        </div>
        <div class="field code-field">
          <label for="code">Verification code</label>
          <div class="code-row">
            <input type="text" id="code" name="code" placeholder="6-digit code" inputmode="numeric" maxlength="6" required>
            <button type="button" id="sendCodeBtn" class="btn btn-secondary-outline">Send code</button>
          </div>
        </div>
        <div class="field">
          <label for="newPassword">New password</label>
          <input type="password" id="newPassword" name="newPassword" placeholder="enter new password" required>
        </div>
        <div class="field">
          <label for="confirmPassword">Confirm new password</label>
          <input type="password" id="confirmPassword" name="confirmPassword" placeholder="re-enter new password" required>
        </div>
        <p class="field-error" id="formError"></p>
        <button type="submit" class="btn btn-donor btn-full">
          Reset password
          <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true"><path d="M20.84 4.61a5.5 5.5 0 0 0-7.78 0L12 5.67l-1.06-1.06a5.5 5.5 0 0 0-7.78 7.78l1.06 1.06L12 21.23l7.78-7.78 1.06-1.06a5.5 5.5 0 0 0 0-7.78z"/></svg>
        </button>
      </form>
      <p class="auth-footer">
        Remembered your password? <a href="login.html">Log in</a>
      </p>
      <a href="index.html" class="back-home">
        <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true"><line x1="19" y1="12" x2="5" y2="12"/><polyline points="12 19 5 12 12 5"/></svg>
        Back to home
      </a>
    </div>
  </section>
  <script src="forgot-password.js"></script>
</body>
</html>
